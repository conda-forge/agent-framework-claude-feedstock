schema_version: 1

context:
  version: "1.0.0b260521"
  python_min: "3.10"

package:
  name: agent-framework-claude
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/a/agent-framework-claude/agent_framework_claude-${{ version }}.tar.gz
  sha256: 32d87380b9e10cd63859f3cf218a3086ac24dafb200acb1fbba3658f6f71f32f

build:
  noarch: python
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - flit-core <4.0,>=3.11
  run:
    - python >=${{ python_min }}
    - agent-framework-core <2,>=1.4.0
    - claude-agent-sdk <0.1.49,>=0.1.36

tests:
  - python:
      imports:
        - agent_framework_claude
      python_version: ${{ python_min }}.*
      pip_check: true

about:
  summary: |
    Claude Agent SDK integration for Microsoft Agent Framework.
  homepage: https://pypi.org/project/agent-framework-claude/
  repository: https://github.com/microsoft/agent-framework
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - killua156
    - mgorny
